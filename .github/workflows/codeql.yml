name: CodeQL

# Triggers `pull_request` for PR checks, `push` to master for baseline analysis,
# `merge_group` so PRs in the merge queue have their pre-merge runs reported,
# and `schedule` for the weekly baseline that GitHub default-setup used to do.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  merge_group:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  Analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        language: [actions, java-kotlin]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      # `build-mode: none` (CodeQL 2.16.5+) scans Java sources directly instead of tracing a
      # Maven/Ant build, so the config's `paths-ignore` actually filters the submodules (`IDE/`,
      # `jython3/`); under the old build-trace mode the extractor traced everything compiled, so
      # submodule alerts persisted. It also drops the need for the Java/Jython/IDE/Maven build steps
      # here (those still run in `continuous-integration.yml`). See wala/ML#476.
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.language == 'java-kotlin' && 'none' || '' }}
          config-file: ./.github/codeql/codeql-config-${{ matrix.language }}.yml

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
