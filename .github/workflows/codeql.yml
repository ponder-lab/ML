name: CodeQL

# Triggers `pull_request` for PR checks, `push` to master for baseline analysis,
# `merge_group` so PRs in the merge queue have their pre-merge runs reported,
# and `schedule` for the weekly baseline that GitHub default-setup used to do.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  merge_group:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  Analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        language: [actions, java-kotlin]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      # Auto-discover submodules and append them to the `java-kotlin` CodeQL
      # config's `paths-ignore`. Avoids hard-coding submodule paths in the
      # config file: if a new submodule is added (or an existing one removed),
      # the exclusion list updates without a separate CodeQL config edit.
      # Submodules are third-party code outside the Ariadne codebase under
      # change; analyzing them produced ~4915 noise findings (mostly
      # `java/missing-override-annotation` on `jython3/`) that drowned the ~85
      # findings on Ariadne's own code. Applies to `java-kotlin` only ŌĆö the
      # `actions` analysis runs on YAML workflows under `.github/workflows/`,
      # which doesn't intersect with submodule filesystem layouts.
      - if: matrix.language == 'java-kotlin'
        name: Append submodule paths to CodeQL paths-ignore
        shell: bash
        run: |
          submodule_paths=$(git config --file .gitmodules --get-regexp path 2>/dev/null | awk '{print $2}')
          if [[ -n "$submodule_paths" ]]; then
            {
              printf '\n# Auto-appended by .github/workflows/codeql.yml from .gitmodules at scan time.\n'
              printf 'paths-ignore:\n'
              while IFS= read -r p; do
                printf "  - '%s/**'\n" "$p"
              done <<< "$submodule_paths"
            } >> .github/codeql/codeql-config-java-kotlin.yml
            echo "Appended paths-ignore for submodules:"
            echo "$submodule_paths"
          else
            echo "No submodules found; CodeQL config unchanged."
          fi

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config-${{ matrix.language }}.yml

      # The Java build needs the Jython3 submodule installed as a local
      # Maven artifact before the main project can resolve. Mirrors the
      # `Install Jython3` step in continuous-integration.yml.
      - if: matrix.language == 'java-kotlin'
        name: Install Jython3
        shell: bash
        run: |
          pushd jython3
          ant
          pushd dist
          mvn install:install-file -Dfile=./jython-dev.jar -DgroupId="org.python" -DartifactId="jython3" -Dversion="0.0.1-SNAPSHOT" -Dpackaging="jar" -DgeneratePom=true -B
          popd
          popd

      - if: matrix.language == 'java-kotlin'
        name: Install IDE
        run: |
          pushd IDE/com.ibm.wala.cast.lsp
          mvn install -B -q -DskipTests
          popd

      - if: matrix.language == 'java-kotlin'
        name: Build with Maven
        run: mvn install -B -DskipTests

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
