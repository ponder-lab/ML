name: Continuous integration
on:
  push:
    # Ignore queue branches (`gh-readonly-queue/...`): their pushes fire both `push:` and
    # `merge_group:`, and the two runs collide in the concurrency group — the cancelled one is
    # reported failed and kicks the PR out of the queue (wala/ML#217). Let `merge_group:` be their
    # sole trigger.
    branches-ignore:
      - 'gh-readonly-queue/**'
    # Setting `branches`/`branches-ignore` on `push:` silently drops tag-push events too; the
    # release-deploy gate below needs `refs/tags/` pushes, so allow all tags explicitly.
    tags:
      - '**'
  pull_request:
  merge_group:
concurrency:
  # Cancel-in-progress for `pull_request` and non-tag `push` (a newer run supersedes), but NOT for
  # `merge_group` or tags: cancelling a queue run marks it failed and kicks the PR out, and tags
  # must finish so the deploy gate isn't cancelled.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')) }}
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      is_semver_release: ${{ steps.tag_check.outputs.is_semver_release }}
    steps:
    - name: Check out wala/ML sources
      uses: actions/checkout@v7
      with:
        submodules: 'recursive'
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Install Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        cache: 'pip'
    - name: Install Python dependencies
      run: pip install -r requirements.txt
    - name: Check formatting with Spotless
      run: mvn spotless:check -B
    - name: Check formatting with Black
      run: black --fast --check --extend-exclude IDE --extend-exclude jython3 .
    - name: Install Jython3
      run: |
        pushd jython3
        ant
        pushd dist
        mvn install:install-file -Dfile=./jython-dev.jar -DgroupId="org.python" -DartifactId="jython3" -Dversion="0.0.2" -Dpackaging="jar" -DgeneratePom=true -B
        popd
        popd
      shell: bash
    - name: Install IDE
      run: |
        pushd IDE/com.ibm.wala.cast.lsp
        mvn package -B -q -DskipTests
        mvn install:install-file -Dfile=target/com.ibm.wala.cast.lsp-0.0.1-SNAPSHOT.jar -DgroupId="com.ibm.wala" -DartifactId="com.ibm.wala.cast.lsp" -Dversion="0.0.1" -Dpackaging="jar" -DgeneratePom=true -B
        popd
    # The whole-project fixture analyses (the `WholeProjectFixtures` category) run in the parallel
    # `whole-project-fixtures` job on PR/branch/queue runs, pulling the wall clock back to the
    # pre-context-broadening band (wala/ML#755). Tag pushes run the FULL suite here instead: the
    # deploy gate below sits in this job, and a release must never deploy while its long-pole
    # tests run unconsumed in a sibling job.
    - name: Build with Maven
      if: ${{ !startsWith(github.ref, 'refs/tags/') }}
      run: mvn -Dlogging.config.file=./logging.ci.properties verify -B -Pjacoco -DexcludedGroups=com.ibm.wala.cast.python.ml.test.categories.WholeProjectFixtures
    - name: Build with Maven (full suite, tag push)
      if: ${{ startsWith(github.ref, 'refs/tags/') }}
      run: mvn -Dlogging.config.file=./logging.ci.properties verify -B -Pjacoco
    # Guard against `run.sh`'s JAR path drifting behind the project version (wala/ML#525): verify
    # its glob resolves to exactly one fat JAR carrying the driver's `Main-Class` manifest entry.
    - name: Smoke-test `run.sh` fat-JAR resolution
      run: |
        cd com.ibm.wala.cast.python.ml
        shopt -s nullglob
        JARS=(target/com.ibm.wala.cast.python.ml-*-fat.jar)
        if [ ${#JARS[@]} -ne 1 ]; then
          echo "Expected exactly one fat JAR in com.ibm.wala.cast.python.ml/target/; got ${#JARS[@]}: ${JARS[*]}" >&2
          exit 1
        fi
        unzip -p "${JARS[0]}" META-INF/MANIFEST.MF \
          | grep -q "^Main-Class: com.ibm.wala.cast.python.ml.driver.Ariadne" \
          || { echo "fat JAR ${JARS[0]} missing expected Main-Class manifest entry" >&2; exit 1; }
      shell: bash
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v7
      with:
        token: $CODECOV_TOKEN
        slug: ponder-lab/ML
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    # Gate the deploy: only a semver-shaped tag that's an ancestor of master, so a feature-branch
    # tag can't trigger a release deploy (wala/ML#421). The non-semver early-exit also keeps the
    # `merge-base` call from erroring on legacy tags. `--depth=50` (not the checkout's shallow
    # `fetch-depth: 1`) gives the tag commit and master's tip a shared parent chain so `--is-ancestor`
    # can link them — the root cause of the 0.44.0/0.45.0 deploy-gate misses (wala/ML#454).
    - name: Verify tag is a semver release tag on master
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        if ! [[ "${{ github.ref_name }}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
          echo "Tag ${{ github.ref_name }} is not semver-shaped; skipping deploy gate."
          echo "is_semver_release=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        git fetch --no-tags --depth=50 origin master
        git merge-base --is-ancestor ${{ github.sha }} origin/master
        echo "is_semver_release=true" >> "$GITHUB_OUTPUT"
      id: tag_check
      shell: bash
    - name: Deploy with Maven
      run: mvn -s .ci.settings.xml -Dgithub.username=$GITHUB_USERNAME -Dgithub.password=$GITHUB_TOKEN deploy -DskipTests -B
      env:
        GITHUB_USERNAME: ${{ secrets.GITHUB_USERNAME }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Hybrid deploy gate (wala/ML#421): master pushes deploy SNAPSHOTs (for downstream consumers
      # like ponder-lab/Hybridize-Functions-Refactoring); semver tag pushes deploy the immutable
      # release. Tag pushes are exempt from `cancel-in-progress` (see the `concurrency` block) so the
      # release deploy reliably finishes — release:prepare lands two master commits in quick
      # succession, and the SNAPSHOT-bump run would otherwise cancel the release run mid-deploy.
      if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || (startsWith(github.ref, 'refs/tags/') && steps.tag_check.outputs.is_semver_release == 'true')) }}
    # On semver tag-push, upload the fat-classifier JAR as a CI artifact for the
    # downstream `release-upload` job to attach to the GitHub Release.
    - name: Upload fat JAR artifact
      if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && steps.tag_check.outputs.is_semver_release == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: fat-jar
        path: com.ibm.wala.cast.python.ml/target/com.ibm.wala.cast.python.ml-*-fat.jar
        if-no-files-found: error
        retention-days: 1
  # The suite's long pole (the whole-project corpus analyses, ~4-6 of the ~12 minutes) runs beside
  # the rest of the suite instead of after it (wala/ML#755). Tag pushes skip this job: the `build`
  # job runs the full suite there so the deploy gate consumes every test itself.
  whole-project-fixtures:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
    - name: Check out wala/ML sources
      uses: actions/checkout@v7
      with:
        submodules: 'recursive'
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Install Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        cache: 'pip'
    - name: Install Python dependencies
      run: pip install -r requirements.txt
    - name: Install Jython3
      run: |
        pushd jython3
        ant
        pushd dist
        mvn install:install-file -Dfile=./jython-dev.jar -DgroupId="org.python" -DartifactId="jython3" -Dversion="0.0.2" -Dpackaging="jar" -DgeneratePom=true -B
        popd
        popd
      shell: bash
    - name: Install IDE
      run: |
        pushd IDE/com.ibm.wala.cast.lsp
        mvn package -B -q -DskipTests
        mvn install:install-file -Dfile=target/com.ibm.wala.cast.lsp-0.0.1-SNAPSHOT.jar -DgroupId="com.ibm.wala" -DartifactId="com.ibm.wala.cast.lsp" -Dversion="0.0.1" -Dpackaging="jar" -DgeneratePom=true -B
        popd
    - name: Run whole-project fixture tests
      run: mvn -Dlogging.config.file=./logging.ci.properties verify -B -Pjacoco -Dgroups=com.ibm.wala.cast.python.ml.test.categories.WholeProjectFixtures -DfailIfNoTests=false
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v7
      with:
        token: $CODECOV_TOKEN
        slug: ponder-lab/ML
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  # Attach the fat-classifier JAR to the GitHub Release on semver tag-push, so standalone-driver
  # users (`java -jar`) can fetch it without the `read:packages` PAT that GitHub Packages requires.
  # A separate job scopes the elevated `contents: write` permission to release tag-pushes only;
  # PR/branch-push runs of `build` keep the workflow-level `contents: read`.
  release-upload:
    needs: build
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && needs.build.outputs.is_semver_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download fat JAR artifact
      uses: actions/download-artifact@v8
      with:
        name: fat-jar
    # `download-artifact@v8` with only `name:` flattens to the workspace root, so the `files:` glob
    # below matches the bare filename (not the original `…/target/` path); `fail_on_unmatched_files:
    # true` makes a future glob drift fail loudly rather than ship an assetless release (wala/ML#561).
    # `action-gh-release` creates the Release for the pushed tag if one doesn't
    # already exist, then attaches the fat JAR. A tag carrying a SemVer pre-release
    # suffix (e.g. `1.0.0-rc.1`, which `tag_check` permits) is published as a GitHub
    # pre-release; a plain `X.Y.Z` tag (a `0.x` is NOT a SemVer pre-release — the
    # major-zero already signals the unstable phase, no `-identifier` suffix) is a
    # full release. `make_latest: legacy` delegates the "Latest" badge to GitHub,
    # which awards it to the highest semantic version among non-pre-releases — so we
    # do NOT force it: cutting an *older* release (a backport like `0.46.2` after
    # `0.49.0`, or re-running on an old tag) won't steal the badge from the newer
    # one. `generate_release_notes: true` fills the body from the PRs merged since
    # the previous tag. Together with the `release.yml` dispatch (wala/ML#455), this
    # makes cutting a release fully hands-off — no manual `gh release create`.
    - name: Create release and attach fat JAR
      uses: softprops/action-gh-release@v3
      with:
        files: com.ibm.wala.cast.python.ml-*-fat.jar
        fail_on_unmatched_files: true
        prerelease: ${{ contains(github.ref_name, '-') }}
        make_latest: legacy
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
