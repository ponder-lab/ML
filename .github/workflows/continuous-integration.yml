name: Continuous integration
on:
  push:
  pull_request:
  merge_group:
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/') }} # Cancel if not a tag push.
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Check out wala/ML sources
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    - name: Install Python dependencies
      run: pip install -r requirements.txt
    - name: Check formatting with Spotless
      run: mvn spotless:check -B
    - name: Check formatting with Black
      run: black --fast --check --extend-exclude IDE --extend-exclude jython3 .
    - name: Install Jython3
      run: |
        pushd jython3
        ant
        pushd dist
        mvn install:install-file -Dfile=./jython-dev.jar -DgroupId="org.python" -DartifactId="jython3" -Dversion="0.0.1-SNAPSHOT" -Dpackaging="jar" -DgeneratePom=true -B
        popd
        popd
      shell: bash
    - name: Install IDE
      run: |
        pushd IDE/com.ibm.wala.cast.lsp
        mvn install -B -q -DskipTests
        popd
    - name: Build with Maven
      run: mvn -Dlogging.config.file=./logging.ci.properties verify -B -Pjacoco
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: $CODECOV_TOKEN
        slug: ponder-lab/ML
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    - name: Deploy with Maven
      run: mvn -s .ci.settings.xml -Dgithub.username=$GITHUB_USERNAME -Dgithub.password=$GITHUB_TOKEN deploy -DskipTests -B
      env:
        GITHUB_USERNAME: ${{ secrets.GITHUB_USERNAME }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Master pushes deploy SNAPSHOT versions; tag pushes deploy release
      # versions. Tag pushes are critical for releases: the canonical
      # `mvn release:prepare` flow lands two consecutive master commits
      # ("Prepare for release X.Y.0." and "Set version for next development
      # iteration to ...") in quick succession, and `concurrency:
      # cancel-in-progress` cancels the first one — so the release version
      # is only ever briefly on master and the SNAPSHOT-bump's run cancels
      # the release run before its deploy step completes. Tag pushes are
      # exempt from `cancel-in-progress` (per the workflow's `concurrency`
      # block) and therefore reliably finish the deploy. Restricted to
      # version-like tags (`0.*`) so legacy/non-release tags don't re-deploy.
      if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/0.')) }}
