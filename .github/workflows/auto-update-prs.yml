name: Auto-update PR branches

# When the default branch advances, update the head branch of every open PR
# targeting it so the PR is no longer "out of date." This avoids the manual
# "Update branch" button click on every push to the base.
#
# Listing both `master` and `main` lets the same workflow file work in repos
# with either default-branch convention without per-repo edits; the irrelevant
# trigger simply never fires.

on:
  push:
    branches: [master, main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-update-prs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const base = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base,
              per_page: 100,
            });
            console.log(`found ${prs.length} open PR(s) targeting ${base}`);
            for (const pr of prs) {
              try {
                await github.rest.pulls.updateBranch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                });
                console.log(`updated #${pr.number} (${pr.head.ref})`);
              } catch (e) {
                // Common reasons: branch already up-to-date, merge conflicts,
                // or fork PRs we can't push to. Log and continue.
                console.log(`#${pr.number} (${pr.head.ref}): ${e.message}`);
              }
            }
